services:
  api-server:
    image: nadeemlab/spt-apiserver:dev
    container_name: apiserver
    ports:
      - target: 8080
        host_ip: 127.0.0.1
        published: 8080
        protocol: tcp
        mode: host
    environment:
      SINGLE_CELL_DATABASE_HOST: testdb
      SINGLE_CELL_DATABASE_USER: postgres
      SINGLE_CELL_DATABASE_PASSWORD: postgres
      API_SERVER_PORT: 8080
      ONDEMAND_HOST: fast-counts-server
      ONDEMAND_PORT: 8016
    extra_hosts:
      - "host.docker.internal:host-gateway"

  fast-counts-server:
    image: nadeemlab/spt-ondemand:dev
    container_name: ondemand
    ports:
      - target: 8016
        host_ip: 127.0.0.1
        published: 8016
        protocol: tcp
        mode: host
    environment:
      SINGLE_CELL_DATABASE_HOST: testdb
      SINGLE_CELL_DATABASE_USER: postgres
      SINGLE_CELL_DATABASE_PASSWORD: postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: .
    volumes:
      - ./public:/code/app/public
      - ./:/code/app
    ports:
      - 80:5173

  testdb:
    image: nadeemlab/spt-db-preloaded-1:latest
    container_name: testdb
    ports:
      - target: 5431
        host_ip: 127.0.0.1
        published: 5431
        protocol: tcp
        mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
