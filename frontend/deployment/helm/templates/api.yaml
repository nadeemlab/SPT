---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spt.fullname" . }}-api
  labels:
    io.kompose.service: api
  {{- include "spt.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.type }}
  selector:
    io.kompose.service: api
  {{- include "spt.selectorLabels" . | nindent 4 }}
  ports:
  - name: "8080"
    port: 8080
    targetPort: 8080

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spt.fullname" . }}-api
  labels:
    io.kompose.service: api
  {{- include "spt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      io.kompose.service: api
    {{- include "spt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        io.kompose.service: api
      {{- include "spt.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - env:
        - name: ONDEMAND_HOST
          value: {{ include "spt.fullname" . }}-counts
        - name: ONDEMAND_PORT
          value: '8016'
        - name: SINGLE_CELL_DATABASE_HOST
          valueFrom:
            secretKeyRef:
              key: db-host
              name: db-secret
              optional: false
        - name: SINGLE_CELL_DATABASE_USER
          valueFrom:
            secretKeyRef:
              key: db-user
              name: db-secret
              optional: false
        - name: SINGLE_CELL_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              key: db-password
              name: db-secret
              optional: false
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ .Values.kubernetesClusterDomain }}
        image: {{ .Values.api.image.repository }}:{{ .Values.api.image.tag | default
          .Chart.AppVersion }}
        name: api
        ports:
        - containerPort: 8080
        resources: {{- toYaml .Values.api.resources | nindent 10 }}
      restartPolicy: Always
